# Full Install CI
# ================
# End-to-end test of install.sh + setup.sh on a fresh machine.
# Runs on version tags (v*) and manual dispatch.
# Matrix: macOS + Ubuntu with independent failure (fail-fast: false).
# Verifies critical tools are installed and functional (via version commands),
# checks that config sections are written to custom files, validates
# idempotency (no duplicates on re-run), and confirms zsh config loads cleanly.

name: Full Install

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  full-install:
    name: Full Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /home/linuxbrew/.linuxbrew/Homebrew/Library/Taps
          key: brew-${{ runner.os }}-${{ hashFiles('install.sh') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Pre-create directories and SSH keys
        run: |
          mkdir -p "${HOME}/bin"
          mkdir -p "${HOME}/.ssh"
          ssh-keygen -t ed25519 -C "ci@test" -f "${HOME}/.ssh/id_ed25519-personal" -N ""
          ssh-keygen -t ed25519 -C "ci@test" -f "${HOME}/.ssh/id_ed25519" -N ""

      - name: Install zsh (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run install.sh in CI mode with developer profile
        env:
          DOTFILES_CI: "true"
        run: ./install.sh --profile developer

      - name: Verify critical tools
        run: |
          # Homebrew isn't in PATH for new shell steps on Linux
          if [[ -d /home/linuxbrew/.linuxbrew ]]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          elif [[ -d /opt/homebrew ]]; then
            eval "$(/opt/homebrew/bin/brew shellenv)"
          fi
          echo "=== Verifying critical tools ==="
          failed=0

          check_tool() {
            local name="$1"
            shift
            if output=$("$@" 2>&1); then
              echo "OK: ${name} => ${output}"
            else
              echo "FAIL: ${name} ('$*' failed)"
              failed=1
            fi
          }

          check_tool "brew"   brew   --version
          check_tool "rg"     rg     --version
          check_tool "jq"     jq     --version
          check_tool "fzf"    fzf    --version
          check_tool "bat"    bat    --version
          check_tool "gh"     gh     --version
          check_tool "nvim"   nvim   --version
          check_tool "go"     go     version
          check_tool "rustc"  rustc  --version
          check_tool "node"   node   --version

          # gsed is macOS-only (on Linux, sed is GNU sed natively)
          if [[ "$(uname)" == "Darwin" ]]; then
            check_tool "gsed" gsed --version
          fi

          # Python via pyenv
          if [[ -x "${HOME}/.pyenv/shims/python" ]]; then
            check_tool "python (pyenv)" "${HOME}/.pyenv/shims/python" --version
          elif command -v python3 &>/dev/null; then
            check_tool "python3" python3 --version
          else
            echo "FAIL: python not found"
            failed=1
          fi

          if [[ "${failed}" -ne 0 ]]; then
            echo "Some critical tools are missing or non-functional!"
            exit 1
          fi

      - name: Verify best-effort tools (warn only)
        run: |
          if [[ -d /home/linuxbrew/.linuxbrew ]]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          elif [[ -d /opt/homebrew ]]; then
            eval "$(/opt/homebrew/bin/brew shellenv)"
          fi
          echo "=== Verifying best-effort tools ==="
          for tool in sdk java dotnet kubectl; do
            if command -v "${tool}" &>/dev/null; then
              echo "OK: ${tool}"
            else
              echo "WARN: ${tool} not found (best-effort)"
            fi
          done

          # SDKMAN is a function, check the directory
          if [[ -d "${HOME}/.sdkman" ]]; then
            echo "OK: SDKMAN directory exists"
          else
            echo "WARN: SDKMAN not installed (best-effort)"
          fi

      - name: Verify config file content
        run: |
          echo "=== Verifying config blocks in custom files ==="
          failed=0
          for section in "Homebrew configuration" "Go configuration" "Rust configuration" \
                         ".NET configuration" "Claude Code configuration"; do
              found=0
              for file in zshenv_custom.zsh zshrc_custom.zsh zprofile_custom.zsh; do
                  if [[ -f "./${file}" ]] && grep -q "${section}" "./${file}"; then
                      found=1
                      break
                  fi
              done
              if [[ "${found}" -eq 1 ]]; then
                  echo "OK: '${section}' found in custom files"
              else
                  echo "FAIL: '${section}' missing from custom files"
                  failed=1
              fi
          done
          if [[ "${failed}" -ne 0 ]]; then
              echo "Some expected config sections are missing!"
              exit 1
          fi

      - name: Verify idempotency
        env:
          DOTFILES_CI: "true"
        run: |
          echo "=== Capturing file contents before second run ==="
          for file in zshenv_custom.zsh zshrc_custom.zsh zprofile_custom.zsh; do
            if [[ -f "./${file}" ]]; then
              cp "./${file}" "/tmp/${file}.before"
            fi
          done

          echo "=== Running install.sh a second time ==="
          ./install.sh --profile developer

          echo "=== Verifying files unchanged after second run ==="
          failed=0
          for file in zshenv_custom.zsh zshrc_custom.zsh zprofile_custom.zsh; do
            if [[ -f "./${file}" ]] && [[ -f "/tmp/${file}.before" ]]; then
              if ! diff -q "./${file}" "/tmp/${file}.before" &>/dev/null; then
                echo "FAIL: ${file} changed after second run!"
                diff "./${file}" "/tmp/${file}.before" || true
                failed=1
              else
                echo "OK: ${file} unchanged"
              fi
            fi
          done
          if [[ "${failed}" -ne 0 ]]; then
            exit 1
          fi
          echo "OK: Idempotency verified (all custom files unchanged)"

      - name: Run setup.sh
        env:
          GIT_NAME: "CI Test User"
          GIT_EMAIL: "ci@test.example.com"
        run: ./setup.sh

      - name: Verify symlinks
        run: |
          echo "=== Verifying symlinks ==="
          for file in zshrc zshenv zprofile zutils.zsh aliases.zsh; do
            if [[ -L "${HOME}/.${file}" ]]; then
              echo "OK: ~/.${file} -> $(readlink "${HOME}/.${file}")"
            else
              echo "FAIL: ~/.${file} not symlinked"
              exit 1
            fi
          done

      - name: Install Oh My Zsh theme
        run: |
          mkdir -p "${HOME}/.oh-my-zsh/custom/themes"
          ln -sf "${PWD}/julianmateu.zsh-theme" "${HOME}/.oh-my-zsh/custom/themes/julianmateu.zsh-theme"

      - name: Verify zsh config loads
        run: |
          # Create minimal custom files for the smoke test
          for file in zshenv_custom.zsh zshrc_custom.zsh zprofile_custom.zsh aliases_custom.zsh; do
            if [[ ! -L "${HOME}/.${file}" ]]; then
              cat > "./${file}" << 'EOF'
          source "${HOME}/.zutils.zsh" || { echo "Failed to load zutils.zsh" >&2; return 1; }
          EOF
              ln -sf "${PWD}/${file}" "${HOME}/.${file}"
            fi
          done

          zsh -c 'source ~/.zshenv && echo "zshenv OK"'
          zsh -c 'source ~/.zprofile && echo "zprofile OK"'
          zsh -i -c 'echo "zshrc OK"' 2>&1 || {
            echo "FAIL: zshrc failed to load"
            exit 1
          }
