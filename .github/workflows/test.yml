# Test Dotfiles CI
# ================
# Runs on push/PR to main. Jobs:
#   1. shellcheck   - Lint bash/zsh scripts
#   2. dry-run      - Verify --dry-run mode on macOS + Ubuntu
#   3. setup        - Test setup.sh symlink creation on macOS + Ubuntu
#   4. smoke-test   - Verify zsh config loads without errors on macOS + Ubuntu

name: Test Dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on bash scripts
        run: shellcheck -x --severity=warning install.sh setup.sh
      - name: Run shellcheck on zsh files (as bash, best-effort)
        run: shellcheck -x -s bash --severity=warning zutils.zsh aliases.zsh || true

  dry-run:
    name: Dry Run (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run dry-run and capture output
        run: |
          ./install.sh --dry-run 2>&1 | tee /tmp/dry-run-output.txt

      - name: Verify dry-run mode is active
        run: |
          # Must contain the dry-run banner
          grep -q "DRY RUN" /tmp/dry-run-output.txt || {
            echo "FAIL: output missing DRY RUN banner"
            exit 1
          }
          echo "OK: DRY RUN banner present"

          # Must contain [DRY RUN] markers for skipped installs
          grep -q "\[DRY RUN\] Would install:" /tmp/dry-run-output.txt || {
            echo "FAIL: output missing [DRY RUN] Would install markers"
            exit 1
          }
          echo "OK: [DRY RUN] Would install markers present"

      - name: Verify expected config sections appear
        run: |
          failed=0
          for section in "Homebrew configuration" "Python configuration" "Go configuration" \
                         "Rust configuration" "SDKMAN configuration" ".NET configuration" \
                         "Claude Code configuration"; do
            if grep -q "${section}" /tmp/dry-run-output.txt; then
              echo "OK: found '${section}'"
            else
              echo "FAIL: missing config section '${section}'"
              failed=1
            fi
          done
          if [[ "${failed}" -ne 0 ]]; then
            echo "Some expected config sections are missing from dry-run output!"
            exit 1
          fi

      - name: Verify dry-run did not actually install anything
        run: |
          # Should NOT contain "CI mode: auto-accepting" (that's real install mode)
          if grep -q "CI mode: auto-accepting" /tmp/dry-run-output.txt; then
            echo "FAIL: dry-run appears to be actually installing things"
            exit 1
          fi
          echo "OK: no actual installations detected"

  setup:
    name: Setup (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Pre-create SSH keys (skip interactive passphrase prompts)
        run: |
          mkdir -p "${HOME}/.ssh"
          ssh-keygen -t ed25519 -C "test@example.com" -f "${HOME}/.ssh/id_ed25519-personal" -N ""
          ssh-keygen -t ed25519 -C "test@example.com" -f "${HOME}/.ssh/id_ed25519" -N ""

      - name: Run setup.sh with test git config
        env:
          GIT_NAME: "Test User"
          GIT_EMAIL: "test@example.com"
        run: |
          # Answer "no" to install.sh prompt; ssh keys already exist so ssh_config skips keygen
          echo "n" | ./setup.sh

      - name: Verify symlinks created
        run: |
          echo "Checking symlinks..."
          for file in zshrc zshenv zprofile zutils.zsh aliases.zsh; do
            if [[ -L "${HOME}/.${file}" ]]; then
              echo "OK: ~/.${file} -> $(readlink "${HOME}/.${file}")"
            else
              echo "MISSING: ~/.${file}"
              exit 1
            fi
          done

      - name: Verify CLAUDE.md NOT symlinked
        run: |
          if [[ -L "${HOME}/.CLAUDE.md" ]]; then
            echo "FAIL: ~/.CLAUDE.md should not be symlinked"
            exit 1
          fi
          echo "OK: ~/.CLAUDE.md not present"

      - name: Verify global_gitignore symlinked
        run: |
          if [[ -L "${HOME}/.global_gitignore" ]]; then
            echo "OK: ~/.global_gitignore -> $(readlink "${HOME}/.global_gitignore")"
          else
            echo "MISSING: ~/.global_gitignore"
            exit 1
          fi

      - name: Verify gitconfig references global_gitignore
        run: |
          if grep -q 'global_gitignore' "${HOME}/.gitconfig"; then
            echo "OK: gitconfig references global_gitignore"
          else
            echo "FAIL: gitconfig should reference global_gitignore"
            cat "${HOME}/.gitconfig"
            exit 1
          fi

  smoke-test:
    name: Shell Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh if needed
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Create minimal custom files
        run: |
          # Create minimal custom files so sourcing doesn't fail
          for file in zshenv_custom.zsh zshrc_custom.zsh zprofile_custom.zsh aliases_custom.zsh; do
            cat > "./${file}" << 'CUSTOMEOF'
          source "${HOME}/.zutils.zsh" || { echo "Failed to load zutils.zsh" >&2; return 1; }
          CUSTOMEOF
          done

      - name: Create symlinks manually for smoke test
        run: |
          for file in zshrc zshenv zprofile zutils.zsh aliases.zsh \
                      zshenv_custom.zsh zshrc_custom.zsh zprofile_custom.zsh aliases_custom.zsh; do
            ln -sf "${PWD}/${file}" "${HOME}/.${file}"
          done
          ln -sf "${PWD}/global_gitignore" "${HOME}/.global_gitignore"

      - name: Install Oh My Zsh (required by zshrc)
        run: |
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
          # Install theme
          mkdir -p "${HOME}/.oh-my-zsh/custom/themes"
          cp julianmateu.zsh-theme "${HOME}/.oh-my-zsh/custom/themes/"

      - name: Verify zshenv loads and zutils functions exist
        run: |
          zsh -c '
            source ~/.zshenv
            # Verify zutils.zsh was loaded by checking its functions exist
            for fn in source_if_exists add_to_path add_to_path_if_exists colorize print_info is_macos; do
              if ! typeset -f "${fn}" > /dev/null; then
                echo "FAIL: function ${fn} not defined after sourcing zshenv"
                exit 1
              fi
              echo "OK: function ${fn} exists"
            done
          '

      - name: Verify zprofile loads and sets expected variables
        run: |
          zsh -c '
            source ~/.zprofile
            # Verify HISTCONTROL is set by zprofile
            if [[ "${HISTCONTROL}" != "ignoreboth" ]]; then
              echo "FAIL: HISTCONTROL not set to ignoreboth (got: ${HISTCONTROL})"
              exit 1
            fi
            echo "OK: HISTCONTROL=${HISTCONTROL}"
          '

      - name: Verify zshrc loads and configures shell
        run: |
          zsh -i -c '
            # Verify EDITOR is set by zshrc
            if [[ "${EDITOR}" != "nvim" ]]; then
              echo "FAIL: EDITOR not set to nvim (got: ${EDITOR})"
              exit 1
            fi
            echo "OK: EDITOR=${EDITOR}"

            # Verify vim mode variable exists (set by zshrc)
            if [[ -z "${vim_ins_mode}" ]]; then
              echo "FAIL: vim_ins_mode not set"
              exit 1
            fi
            echo "OK: vim_ins_mode=${vim_ins_mode}"

            # Verify Oh My Zsh was loaded
            if [[ -z "${ZSH}" ]]; then
              echo "FAIL: ZSH variable not set"
              exit 1
            fi
            echo "OK: ZSH=${ZSH}"
          ' 2>&1 || {
            echo "FAIL: zshrc failed to load"
            exit 1
          }
